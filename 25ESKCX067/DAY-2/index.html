<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registration Form</title>

    <!-- Link CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>Registration Form</h2>

    <form>

        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" placeholder="Enter your full name" required>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Confirm your password" required>

        <label for="mobile">Mobile Number</label>
        <input type="tel" id="mobile" placeholder="Enter your mobile number" required>

        <label for="dob">Date of Birth</label>
        <input type="date" id="dob">

        <label>Gender</label>
        <div class="gender">
            <label><input type="radio" name="gender"> Male</label>
            <label><input type="radio" name="gender"> Female</label>
            <label><input type="radio" name="gender"> Other</label>
        </div>

        <label for="branch">Branch</label>
        <select id="branch">
            <option>Select Branch</option>
            <option>Computer Science</option>
            <option>Information Technology</option>
            <option>Electronics and Communication</option>
            <option>Data Science</option>
            <option>Artificial Intelligence</option>
        </select>

        <label for="address">Address</label>
        <textarea id="address" rows="3" placeholder="Enter your address"></textarea>

        <div class="buttons">
            <button type="submit" class="submit">Register</button>
            <button type="reset" class="reset">Reset</button>
        </div>

    </form>

</div>

</body>
</html>
